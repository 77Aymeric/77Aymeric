name: Update Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile cards
        run: python3 scripts/generate_profile_cards.py

      - name: Commit updated cards
        run: |
          if [ -z "$(git status --porcelain -- assets/profile-stats-dark.svg assets/profile-stats-light.svg assets/contribution-heatmap-dark.svg assets/contribution-heatmap-light.svg)" ]; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-stats-dark.svg assets/profile-stats-light.svg assets/contribution-heatmap-dark.svg assets/contribution-heatmap-light.svg
          git commit -m "chore: update profile activity cards"
          git push
